    <style>
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: hsl(235, 45%, 11%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      }
      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #loading-logo {
        width: 150px;
        height: auto;
        margin-bottom: 32px;
      }
      #progress-container {
        width: 280px;
        height: 6px;
        background: rgba(234, 88, 12, 0.2);
        border-radius: 3px;
        overflow: hidden;
      }
      #progress-bar {
        width: 0%;
        height: 100%;
        background: #ea580c;
        border-radius: 3px;
        animation: progress 1.2s ease-in-out forwards;
      }
      @keyframes progress {
        0% { width: 0%; }
        20% { width: 20%; }
        50% { width: 60%; }
        80% { width: 85%; }
        100% { width: 100%; }
      }
